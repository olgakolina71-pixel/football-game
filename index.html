<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Футбол 70 режимов - Photon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a472a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial, sans-serif; }
        canvas { border: 3px solid gold; border-radius: 10px; max-width: 100%; height: auto; }
        #loading { color: white; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <canvas id="canvas" width="1000" height="700"></canvas>
    <div id="loading">Подключение к серверу Photon...</div>

    <script src="https://cdn.jsdelivr.net/npm/@photonengine/photon@4.1.1/photon.js"></script>
    <script>
        // ⚡ ТВОЙ APP ID ИЗ ФОТОНА ⚡
        const APP_ID = "53b392a9-ecc4-4edb-808b-1841b1933aa3";
        
        let photon = null;
        let room = null;
        let players = {};
        let ball = { x: 500, y: 350, vx: 0, vy: 0 };
        let myId = null;
        let myTeam = null;
        let moveInterval = null;
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const loadingDiv = document.getElementById('loading');
        
        // Инициализация Photon
        function initPhoton() {
            photon = new Photon.PhotonClient(APP_ID, "1.0");
            photon.connect();
            
            photon.onConnectionStateChange = (state) => {
                if (state === Photon.ConnectionState.Connected) {
                    loadingDiv.innerHTML = "Подключено! Создание комнаты...";
                    // Используем фиксированное имя комнаты, чтобы все попадали в одну игру
                    room = photon.joinOrCreateRoom("football_main_room");
                    
                    room.onJoin = () => {
                        loadingDiv.innerHTML = "Игра началась! Управление: стрелки или WASD";
                        myId = photon.userId;
                        // Определяем команду по количеству игроков
                        const playerCount = Object.keys(room.players).length;
                        myTeam = playerCount % 2 === 1 ? "red" : "blue";
                        
                        // Добавляем себя в список игроков
                        players[myId] = {
                            x: 500,
                            y: 350,
                            team: myTeam
                        };
                        
                        // Отправляем свои координаты каждые 30 мс
                        if (moveInterval) clearInterval(moveInterval);
                        moveInterval = setInterval(() => {
                            if (room && myId && players[myId]) {
                                room.send("move", { 
                                    id: myId,
                                    x: players[myId].x, 
                                    y: players[myId].y,
                                    team: players[myId].team
                                });
                            }
                        }, 30);
                    };
                    
                    room.onPlayerJoin = (player) => {
                        // Добавляем нового игрока
                        const playerCount = Object.keys(room.players).length;
                        players[player.userId] = {
                            x: Math.random() * 800 + 100,
                            y: Math.random() * 500 + 100,
                            team: playerCount % 2 === 0 ? "red" : "blue"
                        };
                    };
                    
                    room.onPlayerLeave = (player) => {
                        delete players[player.userId];
                    };
                    
                    room.onMessage = (senderId, event, data) => {
                        if (event === "move" && data) {
                            if (!players[data.id]) {
                                players[data.id] = { x: data.x, y: data.y, team: data.team };
                            } else {
                                players[data.id].x = data.x;
                                players[data.id].y = data.y;
                                players[data.id].team = data.team;
                            }
                        }
                        if (event === "ball" && data) {
                            ball.x = data.x;
                            ball.y = data.y;
                        }
                    };
                } else if (state === Photon.ConnectionState.Disconnected) {
                    loadingDiv.innerHTML = "Потеря связи с сервером. Переподключение...";
                    setTimeout(() => initPhoton(), 3000);
                }
            };
        }
        
        // Управление
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, s: false, a: false, d: false };
        document.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        document.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });
        
        // Движение
        setInterval(() => {
            if (!room || !myId || !players[myId]) return;
            let dx = 0, dy = 0;
            if (keys.ArrowUp || keys.w) dy -= 5;
            if (keys.ArrowDown || keys.s) dy += 5;
            if (keys.ArrowLeft || keys.a) dx -= 5;
            if (keys.ArrowRight || keys.d) dx += 5;
            
            players[myId].x = Math.min(Math.max(players[myId].x + dx, 40), 960);
            players[myId].y = Math.min(Math.max(players[myId].y + dy, 40), 660);
        }, 16);
        
        // Отрисовка поля
        function draw() {
            ctx.clearRect(0, 0, 1000, 700);
            ctx.fillStyle = '#2e8b57';
            ctx.fillRect(0, 0, 1000, 700);
            
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.strokeRect(10, 10, 980, 680);
            ctx.beginPath();
            ctx.arc(500, 350, 70, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(500, 10);
            ctx.lineTo(500, 690);
            ctx.stroke();
            
            ctx.fillStyle = 'rgba(255,0,0,0.3)';
            ctx.fillRect(0, 275, 15, 150);
            ctx.fillStyle = 'rgba(0,0,255,0.3)';
            ctx.fillRect(985, 275, 15, 150);
            
            for (let id in players) {
                const p = players[id];
                ctx.beginPath();
                ctx.arc(p.x, p.y, 22, 0, Math.PI * 2);
                ctx.fillStyle = p.team === 'red' ? '#e74c3c' : '#3498db';
                ctx.fill();
                ctx.strokeStyle = '#ffd700';
                ctx.stroke();
                if (id === myId) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 28, 0, Math.PI * 2);
                    ctx.strokeStyle = 'yellow';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }
            
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, 12, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.font = '16px Arial';
            ctx.fillText('⚽', ball.x-7, ball.y+5);
        }
        
        setInterval(draw, 30);
        initPhoton();
    </script>
</body>
</html>
