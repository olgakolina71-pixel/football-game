<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Футбол 70 режимов - Photon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a472a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial, sans-serif; }
        canvas { border: 3px solid gold; border-radius: 10px; max-width: 100%; height: auto; }
        #loading { color: white; text-align: center; margin-top: 20px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <canvas id="canvas" width="1000" height="700"></canvas>
    <div id="loading">Загрузка Photon SDK...</div>

    <!-- Подключаем Photon SDK из правильного источника -->
    <script src="https://cdn.jsdelivr.net/npm/@photonengine/photon@4.1.1/dist/photon.min.js"></script>
    <script>
        // ⚡ ТВОЙ APP ID ИЗ ФОТОНА ⚡
        const APP_ID = "53b392a9-ecc4-4edb-808b-1841b1933aa3";
        
        let photon = null;
        let room = null;
        let players = {};
        let ball = { x: 500, y: 350, vx: 0, vy: 0 };
        let myId = null;
        let myTeam = null;
        let moveInterval = null;
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const loadingDiv = document.getElementById('loading');
        
        // Ждём загрузки Photon
        function waitForPhoton() {
            if (typeof Photon !== 'undefined') {
                loadingDiv.innerHTML = "Photon загружен! Подключение...";
                initPhoton();
            } else {
                setTimeout(waitForPhoton, 500);
            }
        }
        
        // Инициализация Photon
        function initPhoton() {
            try {
                // Создаём клиент Photon
                photon = new Photon.PhotonClient(APP_ID, Photon.ConnectionProtocol.Udp);
                
                // Обработка подключения
                photon.onConnectionStateChange = (state) => {
                    console.log("Connection state:", state);
                    if (state === Photon.ConnectionState.Connected) {
                        loadingDiv.innerHTML = "Подключено! Вход в комнату...";
                        // Присоединяемся к комнате
                        photon.joinRandomOrCreateRoom("football_room", 20);
                    } else if (state === Photon.ConnectionState.Disconnected) {
                        loadingDiv.innerHTML = "Потеря связи. Переподключение...";
                        setTimeout(() => photon.connect(), 3000);
                    }
                };
                
                // Обработка входа в комнату
                photon.onJoinRoom = (newRoom) => {
                    room = newRoom;
                    loadingDiv.innerHTML = "В игре! Управление: стрелки/WASD";
                    myId = photon.userId;
                    
                    // Определяем команду
                    const playerList = room.getPlayersList();
                    const playerCount = playerList ? playerList.length : 1;
                    myTeam = playerCount % 2 === 1 ? "red" : "blue";
                    
                    // Добавляем себя
                    players[myId] = {
                        x: 500,
                        y: 350,
                        team: myTeam
                    };
                    
                    // Отправляем свои координаты
                    if (moveInterval) clearInterval(moveInterval);
                    moveInterval = setInterval(() => {
                        if (room && myId && players[myId]) {
                            const data = { 
                                id: myId,
                                x: players[myId].x, 
                                y: players[myId].y,
                                team: players[myId].team
                            };
                            room.sendEvent("move", data, Photon.ReceiverGroup.All);
                        }
                    }, 50);
                };
                
                // Обработка событий от других игроков
                photon.onEvent = (eventCode, data, senderId) => {
                    if (eventCode === 1 && data) { // 1 = наш кастомный event
                        const eventData = JSON.parse(data);
                        if (eventData.id && eventData.id !== myId) {
                            if (!players[eventData.id]) {
                                players[eventData.id] = { x: eventData.x, y: eventData.y, team: eventData.team };
                            } else {
                                players[eventData.id].x = eventData.x;
                                players[eventData.id].y = eventData.y;
                                players[eventData.id].team = eventData.team;
                            }
                        }
                    }
                };
                
                // Обработка ухода игроков
                photon.onPlayerLeftRoom = (player) => {
                    if (player && player.userId) {
                        delete players[player.userId];
                    }
                };
                
                // Обработка прихода игроков
                photon.onPlayerJoinedRoom = (player) => {
                    if (player && player.userId && player.userId !== myId) {
                        const playerCount = Object.keys(players).length;
                        players[player.userId] = {
                            x: Math.random() * 800 + 100,
                            y: Math.random() * 500 + 100,
                            team: playerCount % 2 === 0 ? "red" : "blue"
                        };
                    }
                };
                
                // Подключаемся
                photon.connect();
                
            } catch (e) {
                loadingDiv.innerHTML = "Ошибка подключения: " + e.message;
                console.error(e);
            }
        }
        
        // Управление
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, s: false, a: false, d: false };
        document.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        document.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });
        
        // Локальное движение
        setInterval(() => {
            if (!room || !myId || !players[myId]) return;
            let dx = 0, dy = 0;
            if (keys.ArrowUp || keys.w) dy -= 5;
            if (keys.ArrowDown || keys.s) dy += 5;
            if (keys.ArrowLeft || keys.a) dx -= 5;
            if (keys.ArrowRight || keys.d) dx += 5;
            
            players[myId].x = Math.min(Math.max(players[myId].x + dx, 40), 960);
            players[myId].y = Math.min(Math.max(players[myId].y + dy, 40), 660);
        }, 16);
        
        // Отрисовка поля
        function draw() {
            ctx.clearRect(0, 0, 1000, 700);
            ctx.fillStyle = '#2e8b57';
            ctx.fillRect(0, 0, 1000, 700);
            
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.strokeRect(10, 10, 980, 680);
            ctx.beginPath();
            ctx.arc(500, 350, 70, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(500, 10);
            ctx.lineTo(500, 690);
            ctx.stroke();
            
            ctx.fillStyle = 'rgba(255,0,0,0.3)';
            ctx.fillRect(0, 275, 15, 150);
            ctx.fillStyle = 'rgba(0,0,255,0.3)';
            ctx.fillRect(985, 275, 15, 150);
            
            for (let id in players) {
                const p = players[id];
                ctx.beginPath();
                ctx.arc(p.x, p.y, 22, 0, Math.PI * 2);
                ctx.fillStyle = p.team === 'red' ? '#e74c3c' : '#3498db';
                ctx.fill();
                ctx.strokeStyle = '#ffd700';
                ctx.stroke();
                if (id === myId) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 28, 0, Math.PI * 2);
                    ctx.strokeStyle = 'yellow';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }
            
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, 12, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.font = '16px Arial';
            ctx.fillText('⚽', ball.x-7, ball.y+5);
            
            // Отображаем количество игроков
            ctx.font = '14px Arial';
            ctx.fillStyle = 'white';
            ctx.fillText('Игроков: ' + Object.keys(players).length, 20, 30);
        }
        
        setInterval(draw, 30);
        waitForPhoton();
    </script>
</body>
</html>
