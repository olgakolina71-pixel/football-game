<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Футбол 70 режимов - Photon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a472a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial, sans-serif; }
        canvas { border: 3px solid gold; border-radius: 10px; max-width: 100%; height: auto; }
        #loading { color: white; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <canvas id="canvas" width="1000" height="700"></canvas>
    <div id="loading">Подключение к серверу...</div>

    <!-- Подключаем Photon SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@photonengine/photon@4.1.1/photon.js"></script>
    <script>
        // ⚡ ТВОЙ APP ID - ВСТАВЬ СЮДА ⚡
        const APP_ID = "53b392a9-ecc4-4edb-808b-1841b1933aa3";
        
        let photon = null;
        let room = null;
        let players = {};
        let ball = { x: 500, y: 350, vx: 0, vy: 0 };
        let myId = null;
        let myTeam = null;
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Инициализация Photon
        function initPhoton() {
            photon = new Photon.PhotonClient(APP_ID, "1.0");
            photon.connect();
            
            photon.onConnectionStateChange = (state) => {
                if (state === Photon.ConnectionState.Connected) {
                    document.getElementById('loading').innerHTML = "Подключено! Создание лобби...";
                    // Создаём или входим в комнату (лобби с кодом)
                    room = photon.createRoom("football_lobby_" + Math.floor(Math.random() * 10000));
                    
                    room.onJoin = () => {
                        document.getElementById('loading').innerHTML = "Игра началась!";
                        myId = photon.userId;
                        // Определяем команду (по цвету)
                        myTeam = Object.keys(room.players).length % 2 === 0 ? "red" : "blue";
                        // Отправляем свои координаты
                        setInterval(() => {
                            if (room && myId && players[myId]) {
                                room.send("move", { x: players[myId].x, y: players[myId].y, vx: 0, vy: 0 });
                            }
                        }, 50);
                    };
                    
                    room.onPlayerJoin = (player) => {
                        players[player.userId] = {
                            x: player.userId === myId ? 400 : Math.random() * 800 + 100,
                            y: 350,
                            team: Object.keys(players).length % 2 === 0 ? "red" : "blue"
                        };
                    };
                    
                    room.onPlayerLeave = (player) => {
                        delete players[player.userId];
                    };
                    
                    room.onMessage = (senderId, event, data) => {
                        if (event === "move" && data) {
                            if (players[senderId]) {
                                players[senderId].x = data.x;
                                players[senderId].y = data.y;
                            }
                        }
                        if (event === "ball" && data) {
                            ball.x = data.x;
                            ball.y = data.y;
                        }
                    };
                }
            };
        }
        
        // Управление
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, s: false, a: false, d: false };
        document.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        document.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });
        
        // Движение
        setInterval(() => {
            if (!room || !myId) return;
            let dx = 0, dy = 0;
            if (keys.ArrowUp || keys.w) dy -= 5;
            if (keys.ArrowDown || keys.s) dy += 5;
            if (keys.ArrowLeft || keys.a) dx -= 5;
            if (keys.ArrowRight || keys.d) dx += 5;
            if (players[myId]) {
                players[myId].x = Math.min(Math.max(players[myId].x + dx, 40), 960);
                players[myId].y = Math.min(Math.max(players[myId].y + dy, 40), 660);
                room.send("move", { x: players[myId].x, y: players[myId].y });
            }
        }, 30);
        
        // Отрисовка поля
        function draw() {
            ctx.clearRect(0, 0, 1000, 700);
            ctx.fillStyle = '#2e8b57';
            ctx.fillRect(0, 0, 1000, 700);
            
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.strokeRect(10, 10, 980, 680);
            ctx.beginPath();
            ctx.arc(500, 350, 70, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(500, 10);
            ctx.lineTo(500, 690);
            ctx.stroke();
            
            ctx.fillStyle = 'rgba(255,0,0,0.3)';
            ctx.fillRect(0, 275, 15, 150);
            ctx.fillStyle = 'rgba(0,0,255,0.3)';
            ctx.fillRect(985, 275, 15, 150);
            
            for (let id in players) {
                const p = players[id];
                ctx.beginPath();
                ctx.arc(p.x, p.y, 22, 0, Math.PI * 2);
                ctx.fillStyle = p.team === 'red' ? '#e74c3c' : '#3498db';
                ctx.fill();
                ctx.strokeStyle = '#ffd700';
                ctx.stroke();
                if (id === myId) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 28, 0, Math.PI * 2);
                    ctx.strokeStyle = 'yellow';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }
            
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, 12, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
        }
        
        setInterval(draw, 30);
        initPhoton();
    </script>
</body>
</html>
